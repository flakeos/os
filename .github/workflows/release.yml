name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate version tag
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Invalid version tag '$TAG'. Must follow v{major}.{minor}.{patch}" >&2
            exit 1
          fi
          MAJOR=$(echo "$TAG" | cut -d. -f1 | tr -d v)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          if [ "$MINOR" -gt 19 ] || [ "$PATCH" -gt 19 ]; then
            echo "ERROR: minor ($MINOR) and patch ($PATCH) must be between 0 and 19" >&2
            exit 1
          fi
          echo "Version $MAJOR.$MINOR.$PATCH validated"

  iso-smoke:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false
          extra-conf: |
            accept-flake-config = true
      - name: Build lightweight ISO (smoke test)
        run: |
          nix build --impure .#iso-minimal
      - name: Prepare ISO artifact
        run: |
          ls -la result*
          ISO_PATH=$(readlink -f result)
          cp "$ISO_PATH" /tmp/flakeos-minimal-${{ github.ref_name }}.iso
          echo "ISO size: $(du -h /tmp/flakeos-minimal-${{ github.ref_name }}.iso | cut -f1)"
      - uses: actions/upload-artifact@v4
        with:
          name: flakeos-minimal-${{ github.ref_name }}
          path: /tmp/flakeos-minimal-${{ github.ref_name }}.iso

  iso-matrix:
    runs-on: ubuntu-latest
    needs: [iso-smoke]
    strategy:
      matrix:
        variant:
          - desktop
          - laptop
          - server
          - hyprland
          - gnome
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false
          extra-conf: |
            accept-flake-config = true
      - name: Build ISO ${{ matrix.variant }}
        run: |
          nix build --impure .#iso-${{ matrix.variant }}
      - name: Prepare ISO artifact
        run: |
          ls -la result*
          ISO_PATH=$(readlink -f result)
          cp "$ISO_PATH" /tmp/flakeos-${{ matrix.variant }}-${{ github.ref_name }}.iso
          echo "ISO size: $(du -h /tmp/flakeos-${{ matrix.variant }}-${{ github.ref_name }}.iso | cut -f1)"
      - uses: actions/upload-artifact@v4
        with:
          name: flakeos-${{ matrix.variant }}-${{ github.ref_name }}
          path: /tmp/flakeos-${{ matrix.variant }}-${{ github.ref_name }}.iso

  release:
    runs-on: ubuntu-latest
    needs: [validate, iso-smoke, iso-matrix]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: flakeos-*-${{ github.ref_name }}
          merge-multiple: true
      - name: Verify all ISOs
        run: |
          ls -lh flakeos-*.iso
          echo "$(ls flakeos-*.iso | wc -l) ISOs ready for release"
      - name: Generate release notes
        run: |
          bash src/scripts/build/release-notes.sh "${{ github.ref_name }}" > release-notes.md
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            --title "${{ github.ref_name }}" \
            flakeos-*.iso
