name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Lint Nix
        run: |
          nix develop --impure --command statix check src
          nix develop --impure --command deadnix src
          nix develop --impure --command nixpkgs-fmt --check src

  build-iso-minimal:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build minimal ISO
        run: |
          NIXPKGS_ALLOW_BROKEN=1 nix build --impure \
            '.#packages.x86_64-linux.iso-minimal'
      - name: Upload ISO to release
        uses: softprops/action-gh-release@v2
        with:
          files: result/iso/*.iso

  build-iso-graphical:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Build graphical ISO
        run: |
          NIXPKGS_ALLOW_BROKEN=1 nix build --impure \
            '.#packages.x86_64-linux.iso-graphical'
      - name: Upload ISO to release
        uses: softprops/action-gh-release@v2
        with:
          files: result/iso/*.iso
