name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Lint Nix
        run: |
          nix develop --impure --command statix check src
          nix develop --impure --command deadnix src
          nix develop --impure --command nixpkgs-fmt --check src

  eval-tests:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Evaluate library tests
        run: |
          nix-instantiate --eval tests/default.nix
      - name: Evaluate module integration tests
        run: |
          nix-instantiate --eval tests/modules.nix

  test-benchmark:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Run tests and benchmarks
        run: |
          nix-instantiate --eval --strict tests/default.nix
          nix-instantiate --eval --strict tests/modules.nix
