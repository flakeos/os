name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Nix linting
        run: nix develop --impure --command statix check src 2>&1 || (echo "statix: warnings found (non-blocking)" && true)
      - name: Dead code detection
        run: nix develop --impure --command deadnix src
      - name: Formatting check
        run: nix develop --impure --command nixpkgs-fmt --check src
      - name: Library tests
        run: nix-instantiate --eval --strict src/tests/default.nix
      - name: Spell check
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: cspell.json
          files: "**/*.{nix,sh,md,json}"
          incremental_files_only: false
      - name: Nix flake check
        run: nix flake check --impure || echo "flake check: non-blocking"

  iso-smoke-test:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86 qemu-utils
      - name: Build minimal ISO
        run: |
          NIXPKGS_ALLOW_BROKEN=1 nix build --impure \
            '.#packages.x86_64-linux.iso-minimal'
      - name: Run ISO smoke test
        run: |
          iso=$(find "$(readlink -f result)" -name "*.iso" -type f | head -1)
          bash src/scripts/build/iso-smoke.sh "$iso" 180
