name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "src/docs/**"
      - "**.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
        with:
          flakehub: false
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Nix linting
        run: nix develop --impure --command statix check src 2>&1 || (echo "statix: warnings found (non-blocking)" && true)
      - name: Dead code detection
        run: nix develop --impure --command deadnix src
      - name: Formatting check
        run: nix develop --impure --command nixpkgs-fmt --check src
      - name: Library tests
        run: nix-instantiate --eval --strict src/tests/default.nix
      - name: Spell check
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: cspell.json
          files: "**/*.{nix,sh,md,json}"
          incremental_files_only: false
      - name: Nix flake check
        run: nix flake check --impure 2>&1 || (echo "flake check: non-blocking" && true)
