name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Lint Nix
        run: |
          nix develop --impure --command statix check src
          nix develop --impure --command deadnix src
          nix develop --impure --command nixpkgs-fmt --check src

  build-iso-minimal:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Build minimal ISO
        run: |
          NIXPKGS_ALLOW_BROKEN=1 nix build --impure \
            '.#packages.x86_64-linux.iso-minimal'
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: bora-iso-minimal
          path: result/iso/*.iso
          retention-days: 7

  build-iso-graphical:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
        with:
          use-flakehub: false
      - name: Build graphical ISO
        run: |
          NIXPKGS_ALLOW_BROKEN=1 nix build --impure \
            '.#packages.x86_64-linux.iso-graphical'
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: bora-iso-graphical
          path: result/iso/*.iso
          retention-days: 7
